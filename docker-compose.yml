services:
  server:
    build:
      context: ./server
      dockerfile: ../server.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
      - PORT=3001
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/rooms"]
      interval: 30s
      timeout: 3s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: ../client.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  uploads:
